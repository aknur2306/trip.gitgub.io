<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путешествуй и открывай мир</title>
    <style>
        /* Обнуление базовых стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Основной контейнер с фоновым изображением */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            /* В качестве фона используется качественное изображение пирса */
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 80px;
            overflow: hidden;
        }

        /* Шапка сайта */
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        /* Навигационная панель (эффект стекла) */
        .nav-panel {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 6px 6px 24px;
            border-radius: 50px;
            gap: 24px;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .nav-link:hover {
            opacity: 1;
        }

        /* Кнопка "Найти тур" внутри навигации */
        .btn-search {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #004182;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .btn-search:hover {
            background: #002d5c;
        }

        /* Иконка профиля */
        .profile-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background 0.3s ease;
        }

        .profile-icon:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Контентная часть (Заголовок + Кнопка) */
        .main-content {
            margin-top: auto;
            margin-bottom: auto;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Главный заголовок */
        .main-title {
            color: #ffffff;
            font-size: 64px;
            font-weight: 300; /* Тонкое начертание как на макете */
            line-height: 1.2;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
        }

        /* Кнопка "Выбрать тур" */
        .btn-choose {
            display: inline-flex;
            align-items: center;
            align-self: flex-start;
            gap: 16px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 10px 10px 28px;
            border-radius: 50px;
            color: #004182;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            transition: background 0.3s ease, transform 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn-choose:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }

        /* Круглая стрелка внутри большой кнопки */
        .arrow-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: #004182;
            border-radius: 50%;
            color: #ffffff;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .hero-section {
                padding: 24px;
            }
            .header {
                justify-content: space-between;
            }
            .nav-link {
                display: none; /* Скрываем текстовые ссылки на мобильных для экономии места */
            }
            .nav-panel {
                padding: 4px;
            }
            .main-title {
                font-size: 36px;
            }
            .btn-choose {
                font-size: 16px;
                padding: 8px 8px 8px 20px;
            }
            .arrow-circle {
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <header class="header">
            <nav class="nav-panel">
                <a href="#" class="nav-link">Туры</a>
                <a href="#" class="nav-link">Страны</a>
                <a href="#" class="nav-link">Туристам</a>
                <a href="#" class="btn-search">
                    Найти тур
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                </a>
            </nav>
            
            <div class="profile-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </header>

        <main class="main-content">
            <h1 class="main-title">
                Путешествуй и открывай<br>мир и себя в нем
            </h1>
            
            <a href="#" class="btn-choose">
                Выбрать тур
                <div class="arrow-circle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                </div>
            </a>
        </main>
    </section>

</body>
</html>
